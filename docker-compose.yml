services:
  db:
    image: postgres:16-alpine
    container_name: musper-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: musper
      POSTGRES_PASSWORD: musper
      POSTGRES_DB: musper
    ports:
      # Host port 5434 → container 5432 (5432/5433 are taken on this dev machine).
      - "5434:5432"
    volumes:
      - musper_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musper -d musper"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  musper_pgdata:
